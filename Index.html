<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZCZXK Bots</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif}
body{background:#000;color:#fff;overflow-x:hidden}

/* Canvas */
#bg{position:fixed;inset:0;z-index:0}

/* Navbar */
.nav{
  position:fixed;
  top:0;width:100%;
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  z-index:10;
}
.nav h2{color:#00ffff}
.nav a{color:#ccc;margin-left:20px;text-decoration:none}
.nav a:hover{color:#00ffff}

/* Hero */
.hero{text-align:center;padding-top:120px;z-index:2;position:relative}
.hero h1{
  font-size:4em;
  color:#00ffff;
  text-shadow:0 0 20px #00ffff;
}
.typing{
  margin-top:10px;
  color:#aaa;
  height:20px;
}

/* Bots */
.bots{
  margin-top:60px;
  display:flex;
  justify-content:center;
  gap:40px;
  flex-wrap:wrap;
}

.bot-card{
  width:260px;
  background:#111;
  border-radius:20px;
  padding:20px;
  text-align:center;
  box-shadow:0 0 20px #00ffff33;
  transition:.3s;
}
.bot-card:hover{
  transform:translateY(-10px);
  box-shadow:0 0 40px #00ffff;
}

.bot-card img{
  width:90px;height:90px;
  border-radius:50%;
  margin-bottom:10px;
  box-shadow:0 0 20px #00ffff;
}

.btn{
  margin-top:15px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:#00ffff;
  color:#000;
  cursor:pointer;
  box-shadow:0 0 20px #00ffff;
}

/* Features */
.features{text-align:center;margin-top:80px}
.grid{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}
.card{
  background:#111;
  padding:20px;
  border-radius:15px;
}

/* Music Button */
.music{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#00ffff;
  color:#000;
  padding:10px;
  border-radius:50%;
  cursor:pointer;
}

/* Footer */
.footer{text-align:center;margin-top:60px;color:#666;padding-bottom:20px}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- Navbar -->
<div class="nav">
  <h2>ZCZXK</h2>
  <div>
    <a href="#">Home</a>
    <a href="#bots">Bots</a>
    <a href="#features">Features</a>
  </div>
</div>

<!-- Hero -->
<div class="hero">
  <h1>ZCZXK BOTS</h1>
  <div class="typing" id="typing"></div>
</div>

<!-- Bots -->
<div class="bots" id="bots">

  <!-- BOT 1 -->
  <div class="bot-card">
    <img src="https://cdn.discordapp.com/embed/avatars/0.png">
    <h3>Bot One</h3>
    <a href="https://discord.com/oauth2/authorize?client_id=1489882067239047168&permissions=8&integration_type=0&scope=bot" target="_blank">
      <button class="btn">Invite</button>
    </a>
  </div>

  <!-- BOT 2 -->
  <div class="bot-card">
    <img src="https://cdn.discordapp.com/embed/avatars/1.png">
    <h3>Bot Two</h3>
    <a href="https://discord.com/oauth2/authorize?client_id=1497853623621779516&permissions=8&integration_type=0&scope=bot" target="_blank">
      <button class="btn">Invite</button>
    </a>
  </div>

</div>

<!-- Features -->
<div class="features" id="features">
  <h2>Features</h2>
  <div class="grid">
    <div class="card">⚔ Moderation</div>
    <div class="card">💰 Economy</div>
    <div class="card">🎟 Tickets</div>
    <div class="card">⚡ Fast</div>
  </div>
</div>

<div class="footer">© 2026 ZCZXK • PremPlay</div>

<!-- Music -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio.mp3" type="audio/mpeg">
</audio>
<div class="music" onclick="toggleMusic()">🔊</div>

<!-- Scripts -->
<script>
// Typing effect
const text = ["Next Gen Discord Bots","Fast • Secure • Powerful"];
let i=0,j=0,current="",isDeleting=false;
function type(){
  current = text[i];
  document.getElementById("typing").textContent = current.substring(0,j);
  if(!isDeleting && j++ === current.length){
    isDeleting=true; setTimeout(type,1000); return;
  }
  if(isDeleting && j-- === 0){
    isDeleting=false; i=(i+1)%text.length;
  }
  setTimeout(type, isDeleting?50:100);
}
type();

// Music
function toggleMusic(){
  const m=document.getElementById("music");
  m.paused?m.play():m.pause();
}

// Particles
const c=document.getElementById("bg");
const ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;
let p=[];
for(let i=0;i<100;i++){
  p.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2});
}
function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  ctx.fillStyle="#00ffff";
  p.forEach(e=>{
    ctx.beginPath();
    ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
    ctx.fill();
    e.y+=0.5;
    if(e.y>c.height)e.y=0;
  });
}
setInterval(draw,30);
</script>

</body>
</html>
